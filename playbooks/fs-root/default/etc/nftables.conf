#!/usr/sbin/nft -f

flush ruleset

# IPv4 is shielded with NAT
# but IPv6 we need to protect explicitly
table ip6 filter {
  chain input {
    type filter hook input priority filter;
    policy drop;

    iif lo accept
    
    ct state invalid drop
    ct state established,related accept
    meta l4proto ipv6-icmp accept
    ip6 saddr fe80::/10 accept

    # Allow SSH on port 22, since we disabled password login
    # we will use this for rsync
    tcp dport 22 accept
  }
  chain output {
    type filter hook output priority filter;
    policy accept;

    oif lo accept
    # mdns with ipv6 link local does not work for most clients
    ip6 daddr ff02::fb drop
  }
}

